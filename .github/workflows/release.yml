name: Release Module

# Version-driven releases: bump "version" in module.json and push to main.
# CI tags v<version>, injects the release URLs, builds module.zip, and publishes
# a GitHub release with module.json + module.zip attached. Nothing to do by hand.
on:
  push:
    branches: [main]
    paths: ['module.json']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from module.json
        id: v
        run: echo "version=$(node -p "require('./module.json').version")" >> "$GITHUB_OUTPUT"

      - name: Skip if this release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.v.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Release v${{ steps.v.outputs.version }} already exists - skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Inject release URLs into module.json
        if: steps.check.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.v.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          node -e '
            const fs = require("fs");
            const { VERSION, REPO } = process.env;
            const base = `https://github.com/${REPO}`;
            const m = JSON.parse(fs.readFileSync("module.json", "utf8"));
            m.url = base;
            m.manifest = `${base}/releases/latest/download/module.json`;
            m.download = `${base}/releases/download/v${VERSION}/module.zip`;
            fs.writeFileSync("module.json", JSON.stringify(m, null, 4) + "\n");
          '

      - name: Build module.zip
        if: steps.check.outputs.exists == 'false'
        run: |
          zip -r module.zip \
            module.json scripts styles lang templates README.md LICENSE \
            -x '*.DS_Store'

      - name: Publish release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.v.outputs.version }}" \
            module.json module.zip \
            --title "v${{ steps.v.outputs.version }}" \
            --generate-notes
